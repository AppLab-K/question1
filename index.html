<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教員アンケート1</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #0a0a0a;
    color: #e8e8e8;
    min-height: 100vh;
    padding: 20px;
  }

  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 40px 0 80px;
  }

  h1 {
    font-size: 1.3em;
    font-weight: 300;
    letter-spacing: 0.2em;
    margin-bottom: 40px;
    color: #e8e8e8;
    border-bottom: 1px solid #222;
    padding-bottom: 20px;
  }

  h2 {
    font-size: 1.1em;
    font-weight: 300;
    letter-spacing: 0.15em;
    margin-bottom: 30px;
    color: #e8e8e8;
    border-bottom: 1px solid #222;
    padding-bottom: 16px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .q-block { margin-bottom: 32px; }

  .q-label {
    font-size: 0.84em;
    color: #888;
    margin-bottom: 10px;
    line-height: 1.6;
    letter-spacing: 0.02em;
  }

  .opts { display: flex; flex-wrap: wrap; gap: 8px; }

  .opt {
    padding: 9px 16px;
    border: 1px solid #2a2a2a;
    background: #111;
    color: #666;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.88em;
    font-family: inherit;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .opt:hover { border-color: #555; color: #ccc; }

  .opt.sel {
    border-color: #e8e8e8;
    background: #1a1a1a;
    color: #e8e8e8;
  }

  .divider { height: 1px; background: #1a1a1a; margin: 28px 0; }

  .submit-btn {
    width: 100%;
    padding: 15px;
    background: #e8e8e8;
    color: #0a0a0a;
    border: none;
    border-radius: 4px;
    font-size: 0.95em;
    font-family: inherit;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.15s;
    margin-top: 16px;
  }

  .submit-btn:hover { opacity: 0.85; }
  .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  .btn-row { display: flex; gap: 10px; margin-top: 16px; }

  .btn-sub {
    padding: 12px 22px;
    background: transparent;
    border: 1px solid #2a2a2a;
    color: #666;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.88em;
    transition: all 0.15s;
  }

  .btn-sub:hover { border-color: #555; color: #ccc; }

  .btn-danger {
    padding: 10px 18px;
    background: transparent;
    border: 1px solid #5a1a1a;
    color: #c0392b;
    border-radius: 4px;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.84em;
    transition: all 0.15s;
  }

  .btn-danger:hover { background: #1a0808; }

  .err-msg {
    color: #e74c3c;
    font-size: 0.82em;
    margin-top: 8px;
    display: none;
  }

  .pw-input {
    width: 100%;
    padding: 13px;
    background: #111;
    border: 1px solid #2a2a2a;
    color: #e8e8e8;
    border-radius: 4px;
    font-size: 1em;
    font-family: inherit;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.15s;
  }

  .pw-input:focus { border-color: #555; }

  .admin-link {
    text-align: center;
    margin-top: 50px;
    padding-top: 20px;
    border-top: 1px solid #1a1a1a;
  }

  .admin-link a {
    color: #444;
    text-decoration: none;
    font-size: 0.78em;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: color 0.15s;
  }

  .admin-link a:hover { color: #888; }

  /* 管理者テーブル */
  .tbl-wrap { overflow-x: auto; margin-top: 16px; }

  table { width: 100%; border-collapse: collapse; font-size: 0.8em; }

  th {
    background: #111;
    color: #666;
    font-weight: 500;
    padding: 10px 12px;
    border: 1px solid #1e1e1e;
    text-align: left;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }

  td {
    padding: 9px 12px;
    border: 1px solid #1a1a1a;
    color: #888;
    white-space: nowrap;
  }

  tr:hover td { background: #0f0f0f; }

  /* 集計 */
  .result-wrap { margin-top: 30px; }

  .result-item {
    margin-bottom: 24px;
    padding-bottom: 24px;
    border-bottom: 1px solid #1a1a1a;
  }

  .result-item:last-child { border-bottom: none; }

  .result-title {
    font-size: 0.8em;
    color: #666;
    margin-bottom: 12px;
    letter-spacing: 0.03em;
  }

  .result-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 8px;
  }

  .result-name { font-size: 0.85em; color: #ccc; min-width: 150px; }

  .bar-bg {
    flex: 1;
    height: 4px;
    background: #1e1e1e;
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: #e8e8e8;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .result-count { font-size: 0.8em; color: #555; min-width: 60px; text-align: right; }

  .badge {
    display: inline-block;
    background: #111;
    border: 1px solid #222;
    color: #666;
    font-size: 0.78em;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 20px;
    letter-spacing: 0.05em;
  }

  .admin-btns {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }

  .loading-msg { color: #444; font-size: 0.88em; padding: 20px 0; }

  .success-wrap { text-align: center; padding: 3rem 0; }
  .success-icon { font-size: 2.5em; margin-bottom: 16px; }
  .success-wrap p { color: #666; font-size: 0.9em; line-height: 1.8; }

  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(16px);
    background: #e8e8e8;
    color: #0a0a0a;
    padding: 11px 26px;
    border-radius: 4px;
    font-size: 0.85em;
    font-weight: 700;
    letter-spacing: 0.05em;
    opacity: 0;
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  @media (max-width: 480px) {
    body { padding: 16px; }
    .container { padding: 24px 0 60px; }
    h1 { font-size: 1.1em; margin-bottom: 28px; }
    .opt { padding: 10px 14px; font-size: 0.9em; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- アンケート画面 -->
  <div id="sv-survey" class="section active">
    <h1>教員アンケート</h1>

    <div class="q-block">
      <div class="q-label">担当学年</div>
      <div class="opts" data-key="grade">
        <button class="opt" data-value="1年">1年</button>
        <button class="opt" data-value="2年">2年</button>
        <button class="opt" data-value="3年">3年</button>
      </div>
    </div>

    <div class="q-block">
      <div class="q-label">役職</div>
      <div class="opts" data-key="role">
        <button class="opt" data-value="一般">一般</button>
        <button class="opt" data-value="学年主任">学年主任</button>
        <button class="opt" data-value="副主任">副主任</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="q-block">
      <div class="q-label">授業中に雑談をするかどうか（理科）</div>
      <div class="opts" data-key="q1">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
        <button class="opt" data-value="分からない">分からない</button>
      </div>
    </div>

    <div class="q-block">
      <div class="q-label">授業でほぼ毎回生徒を当てる（数学）</div>
      <div class="opts" data-key="q2">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
      </div>
    </div>

    <div class="q-block">
      <div class="q-label">結婚しているかどうか（全員）</div>
      <div class="opts" data-key="q3">
        <button class="opt" data-value="結婚している">結婚している</button>
        <button class="opt" data-value="恋人がいる">恋人がいる</button>
        <button class="opt" data-value="未婚かつ恋人がいない">未婚かつ恋人がいない</button>
        <button class="opt" data-value="秘密">秘密</button>
      </div>
    </div>

    <div class="q-block">
      <div class="q-label">怒ったふりをしたことがあるか（学年主任・副主任）</div>
      <div class="opts" data-key="q4">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
        <button class="opt" data-value="覚えてない">覚えてない</button>
      </div>
    </div>

    <div class="q-block">
      <div class="q-label">正直課題を出すのがめんどくさいと思ったことがあるか（英語）</div>
      <div class="opts" data-key="q5">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
      </div>
    </div>

    <div id="sv-err" class="err-msg">すべての質問に回答してください。</div>
    <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">送信する</button>

    <div class="admin-link">
      <a onclick="showSection('sv-login')">管理者モード →</a>
    </div>
  </div>

  <!-- 完了画面 -->
  <div id="sv-done" class="section">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <h1 style="border:none; text-align:center; margin-bottom:16px;">送信完了</h1>
      <p>ご回答ありがとうございました。<br>再度送信すると回答が上書きされます。</p>
      <div class="btn-row" style="justify-content:center; margin-top:2rem;">
        <button class="btn-sub" onclick="showSection('sv-survey')">回答を修正する</button>
      </div>
    </div>
  </div>

  <!-- ログイン画面 -->
  <div id="sv-login" class="section">
    <h2>管理者ログイン</h2>
    <input type="password" class="pw-input" id="sv-pw" placeholder="パスワードを入力"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div id="pw-err" class="err-msg" style="margin-bottom:10px;">パスワードが違います。</div>
    <div class="btn-row">
      <button class="submit-btn" style="margin-top:0;" onclick="doLogin()">ログイン</button>
      <button class="btn-sub" onclick="showSection('sv-survey')">戻る</button>
    </div>
  </div>

  <!-- 管理者画面 -->
  <div id="sv-admin" class="section">
    <h2>管理者モード — 回答一覧</h2>
    <div class="admin-btns">
      <button class="btn-sub" onclick="showSection('sv-survey')">← 戻る</button>
      <button class="btn-sub" onclick="loadAdmin()">🔄 更新</button>
      <button class="btn-sub" onclick="calcResults()">📊 集計する</button>
      <button class="btn-danger" onclick="clearAll()">🗑 全削除</button>
    </div>
    <div id="admin-content"><div class="loading-msg">読み込み中...</div></div>
    <div id="result-area" class="result-wrap"></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK (Firestore用へ移行) -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection, writeBatch } 
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApCa9WybT_XLI6VlKHFI1vtcaVKUbq-C4",
    authDomain: "question-2506a.firebaseapp.com",
    projectId: "question-2506a",
    storageBucket: "question-2506a.firebasestorage.app",
    messagingSenderId: "937214412547",
    appId: "1:937214412547:web:8ceb379d3e938106420b36"
    // ※ databaseURL は不要になったため削除
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // 端末ごとのIDを生成（localStorageで管理）
  function getUid() {
    let id = localStorage.getItem('sv_uid');
    if (!id) {
      id = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      localStorage.setItem('sv_uid', id);
    }
    return id;
  }

  // グローバルに公開（onclick から呼べるように）
  window._firebase = { db, doc, setDoc, getDoc, getDocs, collection, writeBatch, getUid };

  // 回答送信
  window.submitSurvey = async function() {
    const required = ['grade','role','q1','q2','q3','q4','q5'];
    const missing = required.filter(k => !window._ans[k]);
    const errEl = document.getElementById('sv-err');
    if (missing.length > 0) { errEl.style.display = 'block'; return; }
    errEl.style.display = 'none';

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '送信中...';

    try {
      const uid = getUid();
      const { db, doc, setDoc } = window._firebase;
      
      // Firestoreの「answers」コレクション内の「uid」ドキュメントに保存
      await setDoc(doc(db, 'answers', uid), {
        ...window._ans,
        timestamp: Date.now()
      });
      
      showSection('sv-done');
      showToast('送信しました！');
    } catch(e) {
      showToast('送信失敗。通信環境を確認してください。');
      console.error(e);
    } finally {
      btn.disabled = false;
      btn.textContent = '送信する';
    }
  };

  // 管理者データ読み込み
  window.loadAdmin = async function() {
    const contentEl = document.getElementById('admin-content');
    contentEl.innerHTML = '<div class="loading-msg">読み込み中...</div>';
    document.getElementById('result-area').innerHTML = '';

    try {
      const { db, collection, getDocs } = window._firebase;
      
      // answersコレクションから全ドキュメントを取得
      const snap = await getDocs(collection(db, 'answers'));
      if (snap.empty) {
        contentEl.innerHTML = '<div class="loading-msg">まだ回答がありません。</div>';
        window._adminData = [];
        return;
      }

      const entries = [];
      snap.forEach(doc => {
        entries.push(doc.data());
      });
      window._adminData = entries;

      const qs = ['grade','role','q1','q2','q3','q4','q5'];
      const ths = ['学年','役職','Q1理科','Q2数学','Q3結婚','Q4怒ったふり','Q5英語'];

      let html = `<span class="badge">総回答数：${entries.length} 名</span>
        <div class="tbl-wrap"><table><thead><tr><th>回答者</th>`;
      ths.forEach(t => html += `<th>${t}</th>`);
      html += '</tr></thead><tbody>';
      entries.forEach((d, i) => {
        html += `<tr><td>回答者${i+1}</td>`;
        qs.forEach(k => html += `<td>${esc(d[k]||'')}</td>`);
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      contentEl.innerHTML = html;
    } catch(e) {
      contentEl.innerHTML = '<div class="loading-msg" style="color:#e74c3c;">データの取得に失敗しました。</div>';
      console.error(e);
    }
  };

  // 集計
  window.calcResults = function() {
    const entries = window._adminData || [];
    const area = document.getElementById('result-area');
    if (entries.length === 0) { showToast('データがありません'); return; }

    const qs = [
      { key:'grade', label:'担当学年' },
      { key:'role',  label:'役職' },
      { key:'q1',   label:'授業中に雑談をするかどうか（理科）' },
      { key:'q2',   label:'授業でほぼ毎回生徒を当てる（数学）' },
      { key:'q3',   label:'結婚しているかどうか（全員）' },
      { key:'q4',   label:'怒ったふりをしたことがあるか（学年主任・副主任）' },
      { key:'q5',   label:'正直課題を出すのがめんどくさいと思ったことがあるか（英語）' },
    ];

    let html = '<div style="height:1px;background:#1a1a1a;margin-bottom:24px;"></div>';
    html += `<span class="badge">集計結果 — 総回答数 ${entries.length} 名</span>`;

    qs.forEach(q => {
      const counts = {};
      entries.forEach(d => { if(d[q.key]) counts[d[q.key]] = (counts[d[q.key]]||0)+1; });
      const max = Math.max(...Object.values(counts), 1);

      html += `<div class="result-item"><div class="result-title">${q.label}</div>`;
      Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([label,cnt]) => {
        const pct = Math.round(cnt / entries.length * 100);
        const w = Math.round(cnt / max * 100);
        html += `<div class="result-row">
          <div class="result-name">${esc(label)}</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${w}%"></div></div>
          <div class="result-count">${cnt}票 (${pct}%)</div>
        </div>`;
      });
      html += '</div>';
    });

    area.innerHTML = html;
  };

  // 全削除
  window.clearAll = async function() {
    if (!confirm('全データを削除しますか？この操作は取り消せません。')) return;
    try {
      const { db, collection, getDocs, writeBatch } = window._firebase;
      
      // Firestoreはコレクションの一発削除が無いため、一括処理（Batch）でドキュメントを全て削除
      const snap = await getDocs(collection(db, 'answers'));
      if (snap.empty) return;

      const batch = writeBatch(db);
      snap.forEach(doc => {
        batch.delete(doc.ref);
      });
      await batch.commit();

      await window.loadAdmin();
      document.getElementById('result-area').innerHTML = '';
      showToast('削除しました');
    } catch(e) {
      showToast('削除に失敗しました');
      console.error(e);
    }
  };

  // 前回の回答を復元
  async function restorePrev() {
    const uid = getUid();
    try {
      const { db, doc, getDoc } = window._firebase;
      const docSnap = await getDoc(doc(db, 'answers', uid));
      if (!docSnap.exists()) return;
      const d = docSnap.data();
      Object.keys(d).forEach(k => {
        const g = document.querySelector(`.opts[data-key="${k}"]`);
        if (!g) return;
        g.querySelectorAll('.opt').forEach(b => {
          if (b.dataset.value === d[k]) {
            b.classList.add('sel');
            window._ans[k] = d[k];
          }
        });
      });
    } catch(e) {}
  }

  restorePrev();
</script>

<script>
  // 回答状態管理
  window._ans = {};
  window._adminData = [];

  // ボタン選択
  document.querySelectorAll('.opts').forEach(g => {
    g.querySelectorAll('.opt').forEach(b => {
      b.addEventListener('click', () => {
        g.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
        b.classList.add('sel');
        window._ans[g.dataset.key] = b.dataset.value;
      });
    });
  });

  // 画面切り替え
  window.showSection = function(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  };

  // ログイン
  window.doLogin = function() {
    const pw = document.getElementById('sv-pw').value;
    const errEl = document.getElementById('pw-err');
    if (pw === 'Sample1') {
      errEl.style.display = 'none';
      document.getElementById('sv-pw').value = '';
      showSection('sv-admin');
      window.loadAdmin();
    } else {
      errEl.style.display = 'block';
    }
  };

  // トースト
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  };

  // エスケープ
  window.esc = function(s) {
    return String(s||'').replace(/[&<>'"]/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  };
</script>

</body>
</html>
