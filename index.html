<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教員アンケート</title>
<style>
  /* 全体のベースデザイン（モダンなダークテーマ） */
  body { 
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif; 
    margin: 0; 
    padding: 15px; 
    background-color: #121212; 
    color: #e0e0e0; 
  }
  .container { 
    max-width: 700px; 
    margin: 0 auto; 
    background-color: #1e1e1e; 
    padding: 30px; 
    border-radius: 12px; 
    box-shadow: 0 8px 24px rgba(0,0,0,0.5); 
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  
  h1, h2 { 
    text-align: center;
    border-bottom: 2px solid #333; 
    padding-bottom: 15px; 
    margin-top: 0;
    font-weight: 600;
    color: #ffffff;
  }
  
  /* 質問項目のデザイン */
  .form-group { margin-bottom: 35px; }
  .form-group label.question { 
    display: block; 
    margin-bottom: 15px; 
    font-size: 1.1em; 
    font-weight: bold;
    border-left: 4px solid #4dabf7;
    padding-left: 10px;
    color: #ffffff;
  }

  /* 押しやすいボタン風の選択肢 */
  .options { 
    display: grid; 
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); 
    gap: 12px; 
  }
  .radio-btn { cursor: pointer; display: block; }
  .radio-btn input { display: none; /* 元の丸ポチを隠す */ }
  .radio-btn span { 
    display: flex; 
    align-items: center; 
    justify-content: center; 
    background-color: #2c2c2c; 
    border: 2px solid #3a3a3a; 
    border-radius: 8px; 
    padding: 15px 10px; 
    text-align: center; 
    transition: all 0.2s ease; 
    height: 100%; 
    box-sizing: border-box;
    font-size: 0.95em;
  }
  /* 選択された時のスタイル */
  .radio-btn input:checked + span { 
    background-color: #4dabf7; 
    border-color: #4dabf7; 
    color: #121212; 
    font-weight: bold; 
    box-shadow: 0 0 12px rgba(77, 171, 247, 0.4);
  }
  .radio-btn:hover span { border-color: #555; }

  /* 入力欄・ボタンのデザイン */
  input[type="password"] { 
    width: 100%; padding: 15px; box-sizing: border-box; 
    background-color: #2c2c2c; color: #fff; border: 2px solid #3a3a3a; 
    border-radius: 8px; font-size: 1em; outline: none; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: #4dabf7; }
  
  .btn-submit { 
    width: 100%; padding: 16px; background-color: #4dabf7; color: #121212; 
    border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; 
    transition: all 0.2s; margin-top: 10px;
  }
  .btn-submit:hover { background-color: #3bc9db; transform: translateY(-2px); }
  .btn-submit:disabled { background-color: #555; color: #888; cursor: not-allowed; transform: none; }
  
  .btn-secondary { 
    padding: 10px 20px; background-color: #333; color: #fff; border: 1px solid #555; 
    border-radius: 6px; cursor: pointer; transition: 0.2s; 
  }
  .btn-secondary:hover { background-color: #444; }

  .hidden { display: none !important; }
  
  /* 管理者画面のデザイン */
  .admin-link { text-align: center; margin-top: 40px; }
  .admin-link a { color: #888; text-decoration: none; font-size: 0.9em; transition: color 0.2s; }
  .admin-link a:hover { color: #4dabf7; text-decoration: underline; }
  
  .table-wrapper { overflow-x: auto; margin-top: 20px; border-radius: 8px; border: 1px solid #333; }
  table { width: 100%; border-collapse: collapse; font-size: 0.9em; min-width: 800px; }
  th, td { border-bottom: 1px solid #333; padding: 12px 15px; text-align: left; }
  th { background-color: #252525; color: #aaa; font-weight: normal; white-space: nowrap; }
  tr:hover { background-color: #2a2a2a; }
  
  .result-box { margin-top: 30px; }
  .result-item { margin-bottom: 20px; background: #252525; padding: 20px; border-radius: 8px; border-left: 5px solid #4dabf7; }
  .result-item h4 { margin: 0 0 15px 0; color: #fff; font-size: 1.1em; }
  .result-bar-container { display: flex; align-items: center; margin-bottom: 10px; }
  .result-label { width: 140px; font-size: 0.9em; color: #ccc; }
  .result-bar-bg { flex-grow: 1; background-color: #333; height: 12px; border-radius: 6px; overflow: hidden; margin: 0 15px; }
  .result-bar-fill { background-color: #4dabf7; height: 100%; width: 0%; transition: width 1s ease-out; }
  .result-count { width: 40px; text-align: right; font-weight: bold; color: #4dabf7; }
</style>
</head>
<body>

<!-- アンケート回答画面 -->
<div class="container" id="survey-section">
  <h1>教員アンケート</h1>
  <p style="text-align: center; color: #aaa; margin-bottom: 30px; font-size: 0.9em;">
    ※回答は自動的に保存されます。再度送信すると上書きされます。
  </p>
  
  <form id="surveyForm">
    <div class="form-group">
      <label class="question">担当学年（各学年団）</label>
      <div class="options">
        <label class="radio-btn"><input type="radio" name="grade" value="1年" required><span>1年</span></label>
        <label class="radio-btn"><input type="radio" name="grade" value="2年"><span>2年</span></label>
        <label class="radio-btn"><input type="radio" name="grade" value="3年"><span>3年</span></label>
      </div>
    </div>

    <div class="form-group">
      <label class="question">役職</label>
      <div class="options">
        <label class="radio-btn"><input type="radio" name="role" value="一般" required><span>一般</span></label>
        <label class="radio-btn"><input type="radio" name="role" value="学年主任"><span>学年主任</span></label>
        <label class="radio-btn"><input type="radio" name="role" value="副主任"><span>副主任</span></label>
      </div>
    </div>

    <div class="form-group">
      <label class="question">授業中に雑談をするかどうか（理科）</label>
      <div class="options">
        <label class="radio-btn"><input type="radio" name="q1" value="はい" required><span>はい</span></label>
        <label class="radio-btn"><input type="radio" name="q1" value="いいえ"><span>いいえ</span></label>
        <label class="radio-btn"><input type="radio" name="q1" value="分からない"><span>分からない</span></label>
      </div>
    </div>

    <div class="form-group">
      <label class="question">授業でほぼ毎回生徒を当てる（数学）</label>
      <div class="options">
        <label class="radio-btn"><input type="radio" name="q2" value="はい" required><span>はい</span></label>
        <label class="radio-btn"><input type="radio" name="q2" value="いいえ"><span>いいえ</span></label>
      </div>
    </div>

    <div class="form-group">
      <label class="question">結婚しているかどうか（全員）</label>
      <div class="options">
        <label class="radio-btn"><input type="radio" name="q3" value="結婚している" required><span>結婚している</span></label>
        <label class="radio-btn"><input type="radio" name="q3" value="恋人がいる"><span>恋人がいる</span></label>
        <label class="radio-btn"><input type="radio" name="q3" value="未婚かつ恋人がいない"><span>未婚かつ恋人がいない</span></label>
        <label class="radio-btn"><input type="radio" name="q3" value="秘密"><span>秘密</span></label>
      </div>
    </div>

    <div class="form-group">
      <label class="question">怒ったふりをしたことがあるか（学年主任・副主任）</label>
      <div class="options">
        <label class="radio-btn"><input type="radio" name="q4" value="はい" required><span>はい</span></label>
        <label class="radio-btn"><input type="radio" name="q4" value="いいえ"><span>いいえ</span></label>
        <label class="radio-btn"><input type="radio" name="q4" value="覚えてない分からない"><span>覚えてない分からない</span></label>
      </div>
    </div>

    <div class="form-group">
      <label class="question">正直課題を出すのがめんどくさいと思ったことがあるか（英語）</label>
      <div class="options">
        <label class="radio-btn"><input type="radio" name="q5" value="はい" required><span>はい</span></label>
        <label class="radio-btn"><input type="radio" name="q5" value="いいえ"><span>いいえ</span></label>
      </div>
    </div>

    <button type="submit" class="btn-submit">アンケートを送信する</button>
  </form>
  
  <div class="admin-link">
    <a href="#" onclick="showLogin()">管理者モードはこちら</a>
  </div>
</div>

<!-- 管理者ログイン画面 -->
<div class="container hidden" id="login-section">
  <h2>管理者ログイン</h2>
  <div class="form-group" style="margin-top: 30px;">
    <input type="password" id="adminPassword" placeholder="パスワードを入力">
  </div>
  <div style="display: flex; gap: 10px;">
    <button class="btn-submit" onclick="login()" style="margin-top: 0; flex: 2;">ログイン</button>
    <button class="btn-secondary" onclick="showSurvey()" style="flex: 1;">戻る</button>
  </div>
</div>

<!-- 管理者画面（一覧・集計） -->
<div class="container hidden" id="admin-section" style="max-width: 900px;">
  <h2>回答データ管理</h2>
  <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
    <button class="btn-secondary" onclick="showSurvey()">＜ アンケート画面に戻る</button>
    <button class="btn-submit" onclick="calculateResults()" style="width: auto; margin: 0; padding: 10px 20px;">グラフで集計する</button>
  </div>
  
  <div class="table-wrapper">
    <table id="answersTable">
      <thead>
        <tr>
          <th>回答者</th>
          <th>学年</th>
          <th>役職</th>
          <th>Q1(理科)</th>
          <th>Q2(数学)</th>
          <th>Q3(結婚)</th>
          <th>Q4(怒ったふり)</th>
          <th>Q5(英語)</th>
        </tr>
      </thead>
      <tbody>
        <!-- データがここに挿入されます -->
      </tbody>
    </table>
  </div>

  <div id="resultsArea" class="result-box hidden">
    <!-- 集計結果がここに挿入されます -->
  </div>
</div>

<script>
  // ★★★ ここに新しいGASのURLを貼り付けてください ★★★
  const GAS_URL = 'ここに新しいURLを貼り付ける';

  // 端末ごとの固有IDを生成・取得（名前の代わりに使用）
  let userId = localStorage.getItem('survey_user_id');
  if (!userId) {
    userId = 'user_' + Math.random().toString(36).substr(2, 9);
    localStorage.setItem('survey_user_id', userId);
  }

  // アンケート送信時の処理
  document.getElementById('surveyForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    if (GAS_URL === 'ここに新しいURLを貼り付ける') {
      alert('エラー：GASのURLが設定されていません。');
      return;
    }

    const submitBtn = e.target.querySelector('button[type="submit"]');
    submitBtn.disabled = true;
    submitBtn.innerText = '送信しています...';

    const formData = new FormData(e.target);
    const data = {
      userId: userId, // 自動生成したIDを送信
      grade: formData.get('grade'), role: formData.get('role'),
      q1: formData.get('q1'), q2: formData.get('q2'), q3: formData.get('q3'),
      q4: formData.get('q4'), q5: formData.get('q5')
    };

    fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(data)
    })
    .then(response => response.json())
    .then(result => {
      alert('送信完了しました！ご協力ありがとうございます。');
      // 送信後も選択状態は残しておく（自分が何を選んだか分かるように）
      submitBtn.innerText = '回答を上書き送信する';
    })
    .catch(error => {
      alert('送信に失敗しました。通信環境を確認してください。');
      submitBtn.innerText = 'アンケートを送信する';
    })
    .finally(() => {
      submitBtn.disabled = false;
    });
  });

  // 画面切り替え関数
  function switchSection(showId) {
    ['survey-section', 'login-section', 'admin-section'].forEach(id => {
      document.getElementById(id).classList.add('hidden');
    });
    document.getElementById(showId).classList.remove('hidden');
  }

  function showLogin() { switchSection('login-section'); document.getElementById('adminPassword').value = ''; }
  function showSurvey() { switchSection('survey-section'); }

  // ログイン処理
  function login() {
    const pass = document.getElementById('adminPassword').value;
    if (pass === 'Sample1') {
      switchSection('admin-section');
      document.getElementById('resultsArea').classList.add('hidden');
      loadAdminData();
    } else {
      alert('パスワードが間違っています。');
    }
  }

  // サーバーからデータを取得して一覧表示
  let currentData = [];
  function loadAdminData() {
    const tbody = document.querySelector('#answersTable tbody');
    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px;">データを読み込み中...</td></tr>';
    
    fetch(GAS_URL)
      .then(response => response.json())
      .then(data => {
        currentData = data;
        tbody.innerHTML = '';
        if(data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:30px;">まだ回答がありません。</td></tr>';
          return;
        }
        // データをテーブルに挿入（名前の代わりに「回答者1, 2...」と表示）
        data.forEach((row, index) => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td style="color:#4dabf7;">回答者 ${index + 1}</td>
            <td>${escapeHTML(row.grade)}</td><td>${escapeHTML(row.role)}</td>
            <td>${escapeHTML(row.q1)}</td><td>${escapeHTML(row.q2)}</td>
            <td>${escapeHTML(row.q3)}</td><td>${escapeHTML(row.q4)}</td>
            <td>${escapeHTML(row.q5)}</td>
          `;
          tbody.appendChild(tr);
        });
      })
      .catch(error => {
        tbody.innerHTML = '<tr><td colspan="8" style="color:#ff6b6b; text-align:center;">データの取得に失敗しました。</td></tr>';
      });
  }

  // 集計処理（バーグラフ風に表示）
  function calculateResults() {
    const resultsArea = document.getElementById('resultsArea');
    resultsArea.innerHTML = '';
    resultsArea.classList.remove('hidden');

    if (currentData.length === 0) {
      resultsArea.innerHTML = '<p>集計するデータがありません。</p>';
      return;
    }

    const counts = { grade: {}, role: {}, q1: {}, q2: {}, q3: {}, q4: {}, q5: {} };
    let total = currentData.length;

    currentData.forEach(data => {
      countItem(counts.grade, data.grade); countItem(counts.role, data.role);
      countItem(counts.q1, data.q1); countItem(counts.q2, data.q2);
      countItem(counts.q3, data.q3); countItem(counts.q4, data.q4);
      countItem(counts.q5, data.q5);
    });

    let html = `<h3 style="text-align:center; color:#4dabf7; margin-bottom:30px;">総回答数: ${total} 名</h3>`;
    html += generateBarChartHTML('担当学年', counts.grade, total);
    html += generateBarChartHTML('役職', counts.role, total);
    html += generateBarChartHTML('Q1: 授業中に雑談をするかどうか（理科）', counts.q1, total);
    html += generateBarChartHTML('Q2: 授業でほぼ毎回生徒を当てる（数学）', counts.q2, total);
    html += generateBarChartHTML('Q3: 結婚しているかどうか（全員）', counts.q3, total);
    html += generateBarChartHTML('Q4: 怒ったふりをしたことがあるか（学年主任・副主任）', counts.q4, total);
    html += generateBarChartHTML('Q5: 正直課題を出すのがめんどくさいと思ったことがあるか（英語）', counts.q5, total);

    resultsArea.innerHTML = html;
    
    // グラフのアニメーション発火
    setTimeout(() => {
      document.querySelectorAll('.result-bar-fill').forEach(bar => {
        bar.style.width = bar.getAttribute('data-width');
      });
    }, 50);
  }

  function countItem(obj, val) {
    if (!val) return;
    obj[val] = (obj[val] || 0) + 1;
  }

  // グラフ風のHTMLを生成する関数
  function generateBarChartHTML(title, countObj, total) {
    let html = `<div class="result-item"><h4>${title}</h4>`;
    for (const [key, val] of Object.entries(countObj)) {
      const percentage = Math.round((val / total) * 100);
      html += `
        <div class="result-bar-container">
          <div class="result-label">${escapeHTML(key)}</div>
          <div class="result-bar-bg">
            <div class="result-bar-fill" data-width="${percentage}%"></div>
          </div>
          <div class="result-count">${val}票</div>
        </div>
      `;
    }
    html += `</div>`;
    return html;
  }

  function escapeHTML(str) {
    if (!str) return '';
    return String(str).replace(/[&<>'"]/g, tag => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
    }[tag] || tag));
  }
</script>

</body>
</html>
