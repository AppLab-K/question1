<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネプリーグアンケート</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg-color: #0f1115;
    --card-bg: #1a1d24;
    --text-main: #f3f4f6;
    --text-sub: #9ca3af;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --border: #2d3139;
    --error: #ef4444;
    --success: #10b981;
    --radius-md: 8px;
    --radius-lg: 12px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  [data-theme="light"] {
    --bg-color: #f4f6f9;
    --card-bg: #ffffff;
    --text-main: #1f2937;
    --text-sub: #6b7280;
    --accent: #4f46e5;
    --accent-hover: #4338ca;
    --border: #e5e7eb;
    --error: #dc2626;
    --success: #16a34a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    background: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    line-height: 1.6;
    transition: background var(--transition), color var(--transition);
  }

  /* プログレスバー */
  .progress-container {
    position: fixed;
    top: 0; left: 0; width: 100%;
    height: 4px;
    background: var(--border);
    z-index: 100;
    display: none;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width var(--transition);
  }

  .header-actions {
    display: flex;
    justify-content: flex-end;
    align-items: center;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px 20px 0;
  }

  .theme-toggle-btn {
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-main);
    padding: 10px;
    border-radius: 50%;
    cursor: pointer;
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: var(--transition);
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .theme-toggle-btn:hover { border-color: var(--text-sub); transform: scale(1.05); }
  .theme-toggle-btn svg { width: 20px; height: 20px; fill: currentColor; }
  
  .theme-toggle-btn .icon-sun { display: block; }
  .theme-toggle-btn .icon-moon { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-sun { display: none; }
  [data-theme="light"] .theme-toggle-btn .icon-moon { display: block; }

  .container { max-width: 600px; margin: 0 auto; padding: 20px 20px 80px; }

  h1, h2 { font-weight: 600; letter-spacing: 0.05em; margin-bottom: 30px; text-align: center; }
  h1 { font-size: 1.5rem; }
  h2 { font-size: 1.25rem; }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .q-block {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 24px;
    transition: var(--transition);
    box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
  }
  .q-block.error-highlight {
    border-color: var(--error);
    box-shadow: 0 0 0 1px var(--error);
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .q-label { font-size: 0.95rem; font-weight: 500; margin-bottom: 16px; }
  .q-label span { color: var(--text-sub); font-size: 0.8em; margin-left: 8px; font-weight: normal; }

  .opts { display: flex; flex-wrap: wrap; gap: 10px; }

  .opt {
    flex: 1 1 calc(50% - 10px);
    min-width: 120px;
    padding: 12px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-sub);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 500;
    transition: var(--transition);
    text-align: center;
  }
  .opt:hover { border-color: var(--text-sub); color: var(--text-main); }
  
  .opt.sel {
    background: rgba(99, 102, 241, 0.1);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  [data-theme="light"] .opt.sel { background: rgba(79, 70, 229, 0.08); }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
    box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
  }
  .submit-btn:hover { background: var(--accent-hover); }
  .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; box-shadow: none; }

  .btn-sub {
    padding: 12px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-main);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    transition: var(--transition);
  }
  .btn-sub:hover { background: var(--border); }

  .success-wrap { text-align: center; padding: 40px 20px; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .success-icon { font-size: 3rem; color: var(--success); margin-bottom: 20px; }
  .success-wrap p { color: var(--text-sub); font-size: 0.95rem; margin-bottom: 30px; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text-main); color: var(--bg-color);
    padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 500;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    pointer-events: none; z-index: 1000; text-align: center; max-width: 90%;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .spinner {
    border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff;
    border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .opt { flex: 1 1 100%; }
    .container { padding: 10px 16px 60px; }
  }
</style>
</head>
<body>

<div class="progress-container" id="progress-container">
  <div class="progress-bar" id="progress-bar"></div>
</div>

<div class="header-actions">
  <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()" title="表示モードの切り替え">
    <svg class="icon-sun" viewBox="0 0 24 24"><path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zM5.99 18.01l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.39.39-1.03 0-1.41z"/></svg>
    <svg class="icon-moon" viewBox="0 0 24 24"><path d="M12.3 2a10 10 0 0 0-1.9 14 10 10 0 0 0 14-1.9 1 1 0 0 0-1-1.4 8 8 0 1 1-9.7-9.7 1 1 0 0 0-1.4-1z"/></svg>
  </button>
</div>

<div class="container">
  <div id="sv-survey" class="section active">
    <h1>ネプリーグアンケート</h1>

    <div class="q-block" id="block-grade">
      <div class="q-label">担当学年</div>
      <div class="opts" data-key="grade">
        <button class="opt" data-value="1年">1年</button>
        <button class="opt" data-value="2年">2年</button>
        <button class="opt" data-value="3年">3年</button>
      </div>
    </div>

    <div class="q-block" id="block-role">
      <div class="q-label">役職</div>
      <div class="opts" data-key="role">
        <button class="opt" data-value="一般">一般</button>
        <button class="opt" data-value="学年主任">学年主任</button>
        <button class="opt" data-value="副主任">副主任</button>
      </div>
    </div>

    <div class="q-block" id="block-q1">
      <div class="q-label">授業中に雑談をするかどうか <span>(理科)</span></div>
      <div class="opts" data-key="q1">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
        <button class="opt" data-value="分からない">分からない</button>
      </div>
    </div>

    <div class="q-block" id="block-q2">
      <div class="q-label">授業でほぼ毎回生徒を当てる <span>(数学)</span></div>
      <div class="opts" data-key="q2">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
      </div>
    </div>

    <div class="q-block" id="block-q3">
      <div class="q-label">結婚しているかどうか <span>(全員)</span></div>
      <div class="opts" data-key="q3">
        <button class="opt" data-value="結婚している">結婚している</button>
        <button class="opt" data-value="恋人がいる">恋人がいる</button>
        <button class="opt" data-value="未婚かつ恋人がいない">未婚かつ恋人がいない</button>
        <button class="opt" data-value="秘密">秘密</button>
      </div>
    </div>

    <div class="q-block" id="block-q4">
      <div class="q-label">怒ったふりをしたことがあるか <span>(学年主任・副主任)</span></div>
      <div class="opts" data-key="q4">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
        <button class="opt" data-value="覚えてない">覚えてない</button>
      </div>
    </div>

    <div class="q-block" id="block-q5">
      <div class="q-label">正直課題を出すのがめんどくさいと思ったことがあるか <span>(英語)</span></div>
      <div class="opts" data-key="q5">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">
      <div class="spinner" id="submit-spinner"></div>
      <span id="submit-text">回答を送信する</span>
    </button>
  </div>

  <!-- 完了画面 -->
  <div id="sv-done" class="section">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <h2 style="margin-bottom:16px;">送信完了</h2>
      <p>ご回答ありがとうございました。<br>再度送信すると回答が上書きされます。</p>
      <button class="btn-sub" onclick="showSection('sv-survey')">回答を修正する</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApCa9WybT_XLI6VlKHFI1vtcaVKUbq-C4",
    authDomain: "question-2506a.firebaseapp.com",
    projectId: "question-2506a",
    storageBucket: "question-2506a.firebasestorage.app",
    messagingSenderId: "937214412547",
    appId: "1:937214412547:web:8ceb379d3e938106420b36"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function getUid() {
    let id = localStorage.getItem('sv_uid');
    if (!id) {
      id = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      localStorage.setItem('sv_uid', id);
    }
    return id;
  }

  function getFriendlyErrorMessage(error) {
    console.error("Firebase Error Details:", error);
    const code = error && error.code ? error.code : "";
    const msg = error && error.message ? error.message : "";

    if (code === 'resource-exhausted' || msg.includes('quota') || msg.includes('LIMIT_EXCEEDED')) {
      return '【お知らせ】本日の無料枠（アクセス上限）を超えたため、一時的に受付を停止しています。明日以降に再度お試しください。';
    }
    if (code === 'permission-denied') {
      return 'アクセス権限がありません。セキュリティ設定を見直してください。';
    }
    if (code === 'unavailable' || !navigator.onLine) {
      return 'インターネットへの接続が切断されているか、不安定です。通信環境の良い場所で再度お試しください。';
    }
    return '通信エラーが発生しました。しばらく時間を置いてから再度お試しください。';
  }

  window._firebase = { db, doc, setDoc, getDoc, getUid };

  window.submitSurvey = async function() {
    const required = ['grade','role','q1','q2','q3','q4','q5'];
    let firstError = null;
    
    document.querySelectorAll('.q-block').forEach(b => b.classList.remove('error-highlight'));
    
    for (const k of required) {
      if (!window._ans[k]) {
        const block = document.getElementById(`block-${k}`);
        block.classList.add('error-highlight');
        if (!firstError) firstError = block;
      }
    }

    if (firstError) {
      showToast('未回答の項目があります');
      firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const btn = document.getElementById('submit-btn');
    const spinner = document.getElementById('submit-spinner');
    const text = document.getElementById('submit-text');
    
    btn.disabled = true;
    spinner.style.display = 'block';
    text.textContent = '送信中...';

    try {
      const uid = getUid();
      const { db, doc, setDoc } = window._firebase;
      
      await setDoc(doc(db, 'answers', uid), {
        ...window._ans,
        timestamp: Date.now()
      });
      
      showSection('sv-done');
      showToast('回答を送信しました！');
    } catch(e) {
      const friendlyMsg = getFriendlyErrorMessage(e);
      showToast(friendlyMsg);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      text.textContent = '回答を送信する';
    }
  };

  async function restorePrev() {
    const uid = getUid();
    try {
      const { db, doc, getDoc } = window._firebase;
      const docSnap = await getDoc(doc(db, 'answers', uid));
      if (!docSnap.exists()) return;
      const d = docSnap.data();
      Object.keys(d).forEach(k => {
        const g = document.querySelector(`.opts[data-key="${k}"]`);
        if (!g) return;
        g.querySelectorAll('.opt').forEach(b => {
          if (b.dataset.value === d[k]) {
            b.classList.add('sel');
            window._ans[k] = d[k];
          }
        });
      });
      updateProgress();
    } catch(e) {}
  }
  restorePrev();
</script>

<script>
  window._ans = {};
  const TOTAL_QUESTIONS = 7;

  function initTheme() {
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.setAttribute('data-theme', savedTheme);
  }
  
  window.toggleTheme = function() {
    const currentTheme = document.documentElement.getAttribute('data-theme');
    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('theme', newTheme);
    showToast(newTheme === 'light' ? 'ライトモードに切り替えました' : 'ダークモードに切り替えました');
  };

  initTheme();

  function updateProgress() {
    const answered = Object.keys(window._ans).length;
    const progress = (answered / TOTAL_QUESTIONS) * 100;
    const bar = document.getElementById('progress-bar');
    bar.style.width = `${progress}%`;
    
    const container = document.getElementById('progress-container');
    if (answered > 0 && progress < 100) {
      container.style.display = 'block';
    } else if (progress === 100) {
      setTimeout(() => container.style.display = 'none', 500);
    }
  }

  document.querySelectorAll('.opts').forEach(g => {
    g.querySelectorAll('.opt').forEach(b => {
      b.addEventListener('click', () => {
        g.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
        b.classList.add('sel');
        window._ans[g.dataset.key] = b.dataset.value;
        g.closest('.q-block').classList.remove('error-highlight');
        updateProgress();
      });
    });
  });

  window.showSection = function(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    document.getElementById('progress-container').style.display = (id === 'sv-survey' && Object.keys(window._ans).length > 0) ? 'block' : 'none';
  };

  let toastTimer;
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 4000);
  };
</script>
</body>
</html>
