<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ネプリーグアンケート</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@300;400;500;700&display=swap');

  :root {
    --bg-color: #0f1115;
    --card-bg: #1a1d24;
    --text-main: #f3f4f6;
    --text-sub: #9ca3af;
    --accent: #6366f1;
    --accent-hover: #4f46e5;
    --border: #2d3139;
    --error: #ef4444;
    --success: #10b981;
    --radius-md: 8px;
    --radius-lg: 12px;
    --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    background: var(--bg-color);
    color: var(--text-main);
    min-height: 100vh;
    line-height: 1.6;
  }

  /* プログレスバー */
  .progress-container {
    position: fixed;
    top: 0; left: 0; width: 100%;
    height: 4px;
    background: var(--border);
    z-index: 100;
    display: none;
  }
  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width var(--transition);
  }

  .container {
    max-width: 600px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }

  h1, h2 {
    font-weight: 600;
    letter-spacing: 0.05em;
    margin-bottom: 30px;
    color: var(--text-main);
    text-align: center;
  }
  h1 { font-size: 1.5rem; }
  h2 { font-size: 1.25rem; }

  .section { display: none; animation: fadeIn 0.4s ease; }
  .section.active { display: block; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  /* 質問カード */
  .q-block {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    margin-bottom: 24px;
    transition: var(--transition);
  }
  .q-block.error-highlight {
    border-color: var(--error);
    box-shadow: 0 0 0 1px var(--error);
    animation: shake 0.4s;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .q-label {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-main);
    margin-bottom: 16px;
  }
  .q-label span { color: var(--text-sub); font-size: 0.8em; margin-left: 8px; font-weight: normal; }

  .opts { display: flex; flex-wrap: wrap; gap: 10px; }

  .opt {
    flex: 1 1 calc(50% - 10px); /* スマホでは2列 */
    min-width: 120px;
    padding: 12px 16px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-sub);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 0.9rem;
    font-family: inherit;
    font-weight: 500;
    transition: var(--transition);
    text-align: center;
  }
  .opt:hover { border-color: var(--text-sub); color: var(--text-main); }
  
  .opt.sel {
    background: rgba(99, 102, 241, 0.1);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: var(--transition);
    margin-top: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
  }
  .submit-btn:hover { background: var(--accent-hover); }
  .submit-btn:disabled { opacity: 0.7; cursor: not-allowed; }

  .btn-sub {
    padding: 12px 20px;
    background: var(--card-bg);
    border: 1px solid var(--border);
    color: var(--text-main);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    transition: var(--transition);
  }
  .btn-sub:hover { background: var(--border); }

  .btn-danger {
    padding: 12px 20px;
    background: rgba(239, 68, 68, 0.1);
    border: 1px solid rgba(239, 68, 68, 0.3);
    color: var(--error);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-family: inherit;
    font-size: 0.9rem;
    transition: var(--transition);
  }
  .btn-danger:hover { background: rgba(239, 68, 68, 0.2); }

  .pw-input {
    width: 100%;
    padding: 14px;
    background: var(--bg-color);
    border: 1px solid var(--border);
    color: var(--text-main);
    border-radius: var(--radius-md);
    font-size: 1rem;
    font-family: inherit;
    outline: none;
    margin-bottom: 16px;
    transition: var(--transition);
  }
  .pw-input:focus { border-color: var(--accent); }

  .admin-link {
    text-align: center;
    margin-top: 40px;
  }
  .admin-link a {
    color: var(--text-sub);
    text-decoration: underline;
    font-size: 0.85rem;
    cursor: pointer;
    transition: var(--transition);
  }
  .admin-link a:hover { color: var(--text-main); }

  /* 管理者テーブル＆結果 */
  .tbl-wrap { overflow-x: auto; margin-top: 20px; border-radius: var(--radius-md); border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th { background: var(--card-bg); color: var(--text-sub); padding: 12px; border-bottom: 1px solid var(--border); text-align: left; white-space: nowrap; }
  td { padding: 12px; border-bottom: 1px solid var(--border); color: var(--text-main); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .result-wrap { margin-top: 40px; }
  .result-item { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 20px; }
  .result-title { font-size: 0.95rem; font-weight: 500; color: var(--text-main); margin-bottom: 16px; }
  .result-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
  .result-row:last-child { margin-bottom: 0; }
  .result-name { font-size: 0.85rem; color: var(--text-sub); min-width: 140px; }
  .bar-bg { flex: 1; height: 8px; background: var(--bg-color); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; background: var(--accent); border-radius: 4px; transition: width 0.8s ease-out; }
  .result-count { font-size: 0.85rem; color: var(--text-main); min-width: 70px; text-align: right; }
  
  .badge { display: inline-block; background: rgba(99, 102, 241, 0.1); color: var(--accent); font-size: 0.8rem; font-weight: 500; padding: 6px 12px; border-radius: 20px; margin-bottom: 16px; }

  .admin-btns { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .loading-msg { color: var(--text-sub); font-size: 0.9rem; text-align: center; padding: 40px 0; }

  .success-wrap { text-align: center; padding: 40px 20px; background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius-lg); }
  .success-icon { font-size: 3rem; color: var(--success); margin-bottom: 20px; }
  .success-wrap p { color: var(--text-sub); font-size: 0.95rem; margin-bottom: 30px; }

  .toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--text-main); color: var(--bg-color);
    padding: 12px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 500;
    box-shadow: 0 10px 25px rgba(0,0,0,0.5);
    opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    pointer-events: none; z-index: 1000; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .spinner {
    border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff;
    border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none;
  }
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

  @media (max-width: 480px) {
    .opt { flex: 1 1 100%; } /* スマホで1列に */
    .container { padding: 30px 16px 60px; }
    .result-row { flex-direction: column; align-items: flex-start; gap: 4px; }
    .bar-bg { width: 100%; margin: 4px 0; }
    .result-count { align-self: flex-end; }
  }
</style>
</head>
<body>

<div class="progress-container" id="progress-container">
  <div class="progress-bar" id="progress-bar"></div>
</div>

<div class="container">
  <!-- アンケート画面 -->
  <div id="sv-survey" class="section active">
    <h1>ネプリーグアンケート</h1>

    <div class="q-block" id="block-grade">
      <div class="q-label">担当学年</div>
      <div class="opts" data-key="grade">
        <button class="opt" data-value="1年">1年</button>
        <button class="opt" data-value="2年">2年</button>
        <button class="opt" data-value="3年">3年</button>
      </div>
    </div>

    <div class="q-block" id="block-role">
      <div class="q-label">役職</div>
      <div class="opts" data-key="role">
        <button class="opt" data-value="一般">一般</button>
        <button class="opt" data-value="学年主任">学年主任</button>
        <button class="opt" data-value="副主任">副主任</button>
      </div>
    </div>

    <div class="q-block" id="block-q1">
      <div class="q-label">授業中に雑談をするかどうか <span>(理科)</span></div>
      <div class="opts" data-key="q1">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
        <button class="opt" data-value="分からない">分からない</button>
      </div>
    </div>

    <div class="q-block" id="block-q2">
      <div class="q-label">授業でほぼ毎回生徒を当てる <span>(数学)</span></div>
      <div class="opts" data-key="q2">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
      </div>
    </div>

    <div class="q-block" id="block-q3">
      <div class="q-label">結婚しているかどうか <span>(全員)</span></div>
      <div class="opts" data-key="q3">
        <button class="opt" data-value="結婚している">結婚している</button>
        <button class="opt" data-value="恋人がいる">恋人がいる</button>
        <button class="opt" data-value="未婚かつ恋人がいない">未婚かつ恋人がいない</button>
        <button class="opt" data-value="秘密">秘密</button>
      </div>
    </div>

    <div class="q-block" id="block-q4">
      <div class="q-label">怒ったふりをしたことがあるか <span>(学年主任・副主任)</span></div>
      <div class="opts" data-key="q4">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
        <button class="opt" data-value="覚えてない">覚えてない</button>
      </div>
    </div>

    <div class="q-block" id="block-q5">
      <div class="q-label">正直課題を出すのがめんどくさいと思ったことがあるか <span>(英語)</span></div>
      <div class="opts" data-key="q5">
        <button class="opt" data-value="はい">はい</button>
        <button class="opt" data-value="いいえ">いいえ</button>
      </div>
    </div>

    <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">
      <div class="spinner" id="submit-spinner"></div>
      <span id="submit-text">回答を送信する</span>
    </button>

    <div class="admin-link">
      <a onclick="showSection('sv-login')">管理者モードへ</a>
    </div>
  </div>

  <!-- 完了画面 -->
  <div id="sv-done" class="section">
    <div class="success-wrap">
      <div class="success-icon">✓</div>
      <h2 style="margin-bottom:16px;">送信完了</h2>
      <p>ご回答ありがとうございました。<br>再度送信すると回答が上書きされます。</p>
      <button class="btn-sub" onclick="showSection('sv-survey')">回答を修正する</button>
    </div>
  </div>

  <!-- ログイン画面 -->
  <div id="sv-login" class="section">
    <div class="q-block">
      <h2>管理者ログイン</h2>
      <input type="password" class="pw-input" id="sv-pw" placeholder="パスワードを入力" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="admin-btns" style="margin-bottom: 0;">
        <button class="submit-btn" style="margin-top:0; flex: 1;" onclick="doLogin()">ログイン</button>
        <button class="btn-sub" style="margin-top:0;" onclick="showSection('sv-survey')">戻る</button>
      </div>
    </div>
  </div>

  <!-- 管理者画面 -->
  <div id="sv-admin" class="section">
    <h2>管理者ダッシュボード</h2>
    <div class="admin-btns">
      <button class="btn-sub" onclick="showSection('sv-survey')">← 戻る</button>
      <button class="btn-sub" onclick="loadAdmin()">🔄 更新</button>
      <button class="btn-sub" onclick="calcResults()">📊 集計</button>
      <button class="btn-danger" style="margin-left: auto;" onclick="clearAll()">🗑 全削除</button>
    </div>
    <div id="admin-content"><div class="loading-msg">読み込み中...</div></div>
    <div id="result-area" class="result-wrap"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection, writeBatch } 
    from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyApCa9WybT_XLI6VlKHFI1vtcaVKUbq-C4",
    authDomain: "question-2506a.firebaseapp.com",
    projectId: "question-2506a",
    storageBucket: "question-2506a.firebasestorage.app",
    messagingSenderId: "937214412547",
    appId: "1:937214412547:web:8ceb379d3e938106420b36"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  function getUid() {
    let id = localStorage.getItem('sv_uid');
    if (!id) {
      id = 'u_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
      localStorage.setItem('sv_uid', id);
    }
    return id;
  }

  window._firebase = { db, doc, setDoc, getDoc, getDocs, collection, writeBatch, getUid };

  // データ送信
  window.submitSurvey = async function() {
    const required = ['grade','role','q1','q2','q3','q4','q5'];
    let firstError = null;
    
    // エラーハイライトのリセットとチェック
    document.querySelectorAll('.q-block').forEach(b => b.classList.remove('error-highlight'));
    
    for (const k of required) {
      if (!window._ans[k]) {
        const block = document.getElementById(`block-${k}`);
        block.classList.add('error-highlight');
        if (!firstError) firstError = block;
      }
    }

    // 未回答がある場合、最初のエラー箇所へスクロール
    if (firstError) {
      showToast('未回答の項目があります');
      firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    const btn = document.getElementById('submit-btn');
    const spinner = document.getElementById('submit-spinner');
    const text = document.getElementById('submit-text');
    
    btn.disabled = true;
    spinner.style.display = 'block';
    text.textContent = '送信中...';

    try {
      const uid = getUid();
      const { db, doc, setDoc } = window._firebase;
      
      await setDoc(doc(db, 'answers', uid), {
        ...window._ans,
        timestamp: Date.now()
      });
      
      showSection('sv-done');
      showToast('回答を送信しました！');
    } catch(e) {
      showToast('通信エラーが発生しました');
      console.error(e);
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
      text.textContent = '回答を送信する';
    }
  };

  // 管理者データのロード
  window.loadAdmin = async function() {
    const contentEl = document.getElementById('admin-content');
    contentEl.innerHTML = '<div class="loading-msg">読み込み中...</div>';
    document.getElementById('result-area').innerHTML = '';

    try {
      const { db, collection, getDocs } = window._firebase;
      const snap = await getDocs(collection(db, 'answers'));
      
      if (snap.empty) {
        contentEl.innerHTML = '<div class="loading-msg">まだ回答がありません。</div>';
        window._adminData = [];
        return;
      }

      const entries = [];
      snap.forEach(doc => entries.push(doc.data()));
      window._adminData = entries;

      const qs = ['grade','role','q1','q2','q3','q4','q5'];
      const ths = ['学年','役職','Q1(理科)','Q2(数学)','Q3(結婚)','Q4(怒ふり)','Q5(英語)'];

      let html = `<span class="badge">総回答数：${entries.length} 名</span>
        <div class="tbl-wrap"><table><thead><tr><th>回答者ID</th>`;
      ths.forEach(t => html += `<th>${t}</th>`);
      html += '</tr></thead><tbody>';
      entries.forEach((d, i) => {
        html += `<tr><td>回答者 ${i+1}</td>`;
        qs.forEach(k => html += `<td>${esc(d[k]||'')}</td>`);
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      contentEl.innerHTML = html;
    } catch(e) {
      contentEl.innerHTML = '<div class="loading-msg" style="color:var(--error);">データの取得に失敗しました。</div>';
    }
  };

  // 集計処理
  window.calcResults = function() {
    const entries = window._adminData || [];
    const area = document.getElementById('result-area');
    if (entries.length === 0) { showToast('データがありません'); return; }

    const qs = [
      { key:'grade', label:'担当学年' },
      { key:'role',  label:'役職' },
      { key:'q1',   label:'授業中に雑談をするかどうか (理科)' },
      { key:'q2',   label:'授業でほぼ毎回生徒を当てる (数学)' },
      { key:'q3',   label:'結婚しているかどうか (全員)' },
      { key:'q4',   label:'怒ったふりをしたことがあるか (学年主任・副主任)' },
      { key:'q5',   label:'正直課題を出すのがめんどくさいか (英語)' },
    ];

    let html = `<span class="badge" style="background: rgba(16, 185, 129, 0.1); color: var(--success);">集計結果 (${entries.length} 名)</span>`;

    qs.forEach(q => {
      const counts = {};
      entries.forEach(d => { if(d[q.key]) counts[d[q.key]] = (counts[d[q.key]]||0)+1; });
      const max = Math.max(...Object.values(counts), 1);

      html += `<div class="result-item"><div class="result-title">${q.label}</div>`;
      Object.entries(counts).sort((a,b)=>b[1]-a[1]).forEach(([label,cnt]) => {
        const pct = Math.round(cnt / entries.length * 100);
        const w = Math.round(cnt / max * 100);
        html += `<div class="result-row">
          <div class="result-name">${esc(label)}</div>
          <div class="bar-bg"><div class="bar-fill" style="width:${w}%"></div></div>
          <div class="result-count">${cnt}票 (${pct}%)</div>
        </div>`;
      });
      html += '</div>';
    });
    area.innerHTML = html;
  };

  // 全削除
  window.clearAll = async function() {
    if (!confirm('全データを削除しますか？この操作は取り消せません。')) return;
    try {
      const { db, collection, getDocs, writeBatch } = window._firebase;
      const snap = await getDocs(collection(db, 'answers'));
      if (snap.empty) return;

      const batch = writeBatch(db);
      snap.forEach(doc => batch.delete(doc.ref));
      await batch.commit();

      await window.loadAdmin();
      document.getElementById('result-area').innerHTML = '';
      showToast('全データを削除しました');
    } catch(e) {
      showToast('削除に失敗しました');
    }
  };

  // 過去の回答復元
  async function restorePrev() {
    const uid = getUid();
    try {
      const { db, doc, getDoc } = window._firebase;
      const docSnap = await getDoc(doc(db, 'answers', uid));
      if (!docSnap.exists()) return;
      const d = docSnap.data();
      Object.keys(d).forEach(k => {
        const g = document.querySelector(`.opts[data-key="${k}"]`);
        if (!g) return;
        g.querySelectorAll('.opt').forEach(b => {
          if (b.dataset.value === d[k]) {
            b.classList.add('sel');
            window._ans[k] = d[k];
          }
        });
      });
      updateProgress();
    } catch(e) {}
  }
  restorePrev();
</script>

<script>
  window._ans = {};
  window._adminData = [];
  const TOTAL_QUESTIONS = 7; // 質問の総数

  // プログレスバー更新
  function updateProgress() {
    const answered = Object.keys(window._ans).length;
    const progress = (answered / TOTAL_QUESTIONS) * 100;
    const bar = document.getElementById('progress-bar');
    bar.style.width = `${progress}%`;
    
    const container = document.getElementById('progress-container');
    if (answered > 0 && progress < 100) {
      container.style.display = 'block';
    } else if (progress === 100) {
      setTimeout(() => container.style.display = 'none', 500); // 完了したら隠す
    }
  }

  // 選択肢のクリックイベント
  document.querySelectorAll('.opts').forEach(g => {
    g.querySelectorAll('.opt').forEach(b => {
      b.addEventListener('click', () => {
        g.querySelectorAll('.opt').forEach(x => x.classList.remove('sel'));
        b.classList.add('sel');
        window._ans[g.dataset.key] = b.dataset.value;
        
        // エラーハイライトの解除
        g.closest('.q-block').classList.remove('error-highlight');
        
        updateProgress();
      });
    });
  });

  // 画面遷移
  window.showSection = function(id) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    
    // プログレスバーの表示制御
    document.getElementById('progress-container').style.display = (id === 'sv-survey' && Object.keys(window._ans).length > 0) ? 'block' : 'none';
  };

  // ログイン
  window.doLogin = function() {
    const pw = document.getElementById('sv-pw').value;
    if (pw === 'Sample1') {
      document.getElementById('sv-pw').value = '';
      showSection('sv-admin');
      window.loadAdmin();
    } else {
      showToast('パスワードが違います');
    }
  };

  // トースト通知
  let toastTimer;
  window.showToast = function(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
  };

  window.esc = function(s) {
    return String(s||'').replace(/[&<>'"]/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
  };
</script>

</body>
</html>
